<!DOCTYPE html >
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veloria Secure Payment</title>

  <script src="https://fabmisr.gateway.mastercard.com/form/version/100/merchant/770845130101/session.js"></script>
  <script src="https://fabmisr.gateway.mastercard.com/static/threeDS/1.3.0/three-ds.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #fff9fc, #eef9ff);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,.85);
      border-radius: 30px;
      padding: 40px;
      text-align: center;
    }

    #status {
      margin: 20px 0;
      color: #444;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      background: black;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: none;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Veloria Payment</h2>

  <div id="status">Loading...</div>

<div id="payment-form" style="display:none;">
  <input id="card-number" placeholder="Card Number" readonly />
  <input id="expiry-month" placeholder="MM" readonly />
  <input id="expiry-year" placeholder="YY" readonly />
  <input id="security-code" placeholder="CVV" readonly />
</div>

  <button id="payBtn" onclick="submitCard()">Pay Now</button>
 <div id="3DSUI"></div>

</div>

<script>

let sessionData = null;
let transactionId = "TXN-" + Date.now();
let authenticationReady = false;
let authenticationTransactionId = null;
async function initPayment() {
 console.log("INIT PAYMENT STARTED");
  const status = document.getElementById("status");

  try {

    const response = await fetch("/api/create-payment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        amount: 100,
        orderId: "TEST-" + Date.now()
      })
    });

    const data = await response.json();

    sessionData = data;

    console.log("SESSION DATA:", data);

    if (!data.success || !data.sessionId) {
      status.innerHTML = "Session failed";
      return;
    }

PaymentSession.configure({
  session: data.sessionId,

  frameEmbeddingMitigation: ["javascript"],

  fields: {
    card: {
      number: "#card-number",
      expiryMonth: "#expiry-month",
      expiryYear: "#expiry-year",
      securityCode: "#security-code"
    }
  },

  callbacks: {
  initialized: function(response) {
 
    console.log("SESSION INITIALIZED", response);
    document.getElementById("payment-form").style.display = "block";

document.getElementById("payBtn").style.display = "block";

document.getElementById("status").innerHTML =
  "Enter card details then click Pay Now";
    ThreeDS.configure({
  merchantId: sessionData.merchantId,
  sessionId: sessionData.sessionId,
  containerId: "3DSUI",

  callback: function () {
    console.log("3DS CONFIGURED");
  },

  configuration: {
    userLanguage: "en-US",
    wsVersion: 100
  }
});

  },

        formSessionUpdate: async function(response) {

          console.log("SESSION UPDATED:", response);

          if (response.status !== "ok") {
            console.log("SESSION NOT OK");
            return;
          }

           
          ThreeDS.initiateAuthentication(
  sessionData.orderId,
  transactionId,

  function(data) {

    console.log("INIT AUTH:", data);

    if (data.gatewayRecommendation === "PROCEED") {


      authenticationReady = true;

document.getElementById("status").innerHTML =
  "Starting 3DS Authentication...";

openCheckout();

    } else {

      document.getElementById("status").innerHTML =
        "Card not eligible for 3DS";

    }

  }
);

   
               
        }
      }
    });

  } catch (e) {
    console.error(e);
    status.innerHTML = "Error loading session";
  }
}

function submitCard() {
document.getElementById("payBtn").disabled = true;
  document.getElementById("status").innerHTML =
    "Sending card details...";

  PaymentSession.updateSessionFromForm("card");
}

function openCheckout() {

  if (!authenticationReady) {
    alert("3DS not ready yet");
    return;
  }

  ThreeDS.authenticatePayer(
    sessionData.orderId,
    transactionId,

    async function(data) {

      console.log("AUTH RESULT:", data);
authenticationTransactionId = transactionId;

console.log(
  "AUTH TXN ID:",
  authenticationTransactionId
);
     if (data.htmlRedirectCode) {

  const container =
    document.getElementById("3DSUI");

  container.innerHTML =
    data.htmlRedirectCode;

  const form =
    document.getElementById(
      "threedsChallengeRedirectForm"
    );

setTimeout(() => {

  if (form) {
    form.submit();
  }

}, 300);

const authInterval = setInterval(async () => {

  const authResponse =
    await fetch("/api/check-auth", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        orderId: sessionData.orderId,
        authenticationTransactionId:
          authenticationTransactionId
      })
    });

  const authData =
    await authResponse.json();

  console.log(
    "CHECK AUTH:",
    authData
  );

  const status =
    authData?.order?.authenticationStatus;

  if (
    status === "AUTHENTICATION_SUCCESSFUL"
  ) {

    clearInterval(authInterval);

    const payResponse =
      await fetch("/api/pay", {
        method: "POST",
        headers: {
          "Content-Type":
            "application/json"
        },
        body: JSON.stringify({
          sessionId:
            sessionData.sessionId,
          orderId:
            sessionData.orderId,
          amount:
            sessionData.amount,
          authenticationTransactionId:
            authenticationTransactionId
        })
      });

    const payData =
      await payResponse.json();

    console.log(
      "FINAL PAY:",
      payData
 
  );
  if (
  payData?.result?.result === "SUCCESS"
) {

  showSuccess(payData);

} else {

  const gatewayCode =
payData?.result?.response?.gatewayCode;

let reason = "Payment Declined";

if (gatewayCode === "INSUFFICIENT_FUNDS") {
  reason = "Your card has insufficient funds";
}

if (gatewayCode === "DECLINED") {
  reason = "The bank declined the transaction";
}

if (gatewayCode === "EXPIRED_CARD") {
  reason = "Card has expired";
}

if (gatewayCode === "TIMED_OUT") {
  reason = "Authentication timed out";
}

  showFailure(reason);
}
  }

}, 3000);


return;
}

      if (
        data.gatewayRecommendation === "PROCEED" &&
        data.restApiResponse?.result === "SUCCESS"
      ) {

        const payResponse = await fetch("/api/pay", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
  sessionId: sessionData.sessionId,
  orderId: sessionData.orderId,
  amount: sessionData.amount,
  authenticationTransactionId:
    authenticationTransactionId
})
        });

        const payData = await payResponse.json();

        console.log("FINAL PAY:", payData);
      }

    }
  );

}  
function showSuccess(payData) {

  document.getElementById("3DSUI").style.display = "none";

  document.getElementById("payment-form").style.display = "none";

  document.getElementById("payBtn").style.display = "none";

  const result =
    document.getElementById("paymentResult");

  result.style.display = "block";

  result.innerHTML = `
    <h2>✅ Payment Successful</h2>
    <p>Your payment was approved.</p>
  `;
}

function showFailure(message) {

  document.getElementById("3DSUI").style.display = "none";

  document.getElementById("payment-form").style.display = "none";

  document.getElementById("payBtn").style.display = "none";

  const result =
    document.getElementById("paymentResult");

  result.style.display = "block";

  result.innerHTML = `
    <h2>❌ Payment Failed</h2>
    <p>${message}</p>
  `;
}
initPayment();
</script>
<div id="3DSUI"></div>

<div id="paymentResult" style="
display:none;
margin-top:20px;
padding:20px;
border-radius:16px;
background:white;
text-align:center;
font-weight:600;
"></div></body>
</html>
