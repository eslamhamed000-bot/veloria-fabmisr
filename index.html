<!DOCTYPE html>
<html>
<head>
  <title>Veloria Payments</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #f7dbe8, #dcefff);
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 45px;
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      max-width: 520px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      color: #222;
    }

    p {
      color: #666;
      font-size: 18px;
      line-height: 1.6;
    }

    .status {
      margin-top: 25px;
      padding: 14px 20px;
      border-radius: 999px;
      background: #eefaf1;
      color: #168a3a;
      font-weight: bold;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Veloria Payments</h1>
    <p>Secure FABMISR payment bridge for Veloria Makeup & Skincare.</p>
    <div class="status">System Online</div>
  </div>
</body>
</html>
