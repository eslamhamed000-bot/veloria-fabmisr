<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veloria Secure Payment</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --pink:#f6c8d8;
      --pink2:#ee9fbd;
      --blue:#dcefff;
      --blue2:#9fd2ff;
      --ink:#202026;
      --muted:#777982;
      --white:rgba(255,255,255,.82);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      min-height:100vh;
      font-family:"Inter",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 14% 12%, rgba(246,200,216,.72), transparent 30%),
        radial-gradient(circle at 86% 16%, rgba(220,239,255,.95), transparent 34%),
        linear-gradient(135deg,#fffafd,#f7fbff);
    }

    .page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 16px;
    }

    .card{
      width:100%;
      max-width:860px;
      background:rgba(255,255,255,.68);
      backdrop-filter:blur(22px);
      border:1px solid rgba(255,255,255,.95);
      border-radius:36px;
      box-shadow:0 30px 90px rgba(140,190,230,.22);
      padding:34px;
      display:grid;
      grid-template-columns:1fr 360px;
      gap:28px;
      align-items:center;
    }

    .brand{
      text-align:center;
      padding:10px;
    }

    .brand img{
      width:150px;
      height:auto;
      object-fit:contain;
      mix-blend-mode:multiply;
      margin-bottom:22px;
    }

    h1{
      font-family:"DM Serif Display",serif;
      font-size:52px;
      font-weight:400;
      line-height:1.05;
      margin-bottom:12px;
    }

    h1 span{
      background:linear-gradient(135deg,var(--pink2),var(--blue2));
      -webkit-background-clip:text;
      color:transparent;
    }

    .sub{
      color:var(--muted);
      font-size:15px;
      line-height:1.7;
      max-width:420px;
      margin:auto;
    }

    .pay-box{
      background:rgba(255,255,255,.9);
      border:1px solid #fff;
      border-radius:30px;
      padding:28px;
      box-shadow:0 22px 60px rgba(0,0,0,.07);
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:22px;
    }

    .secure{
      background:#eefaf3;
      color:#168449;
      font-size:12px;
      font-weight:800;
      padding:8px 12px;
      border-radius:999px;
    }

    .lock{
      width:38px;
      height:38px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--pink),var(--blue));
      display:flex;
      align-items:center;
      justify-content:center;
    }

    h2{
      font-family:"DM Serif Display",serif;
      font-size:30px;
      font-weight:400;
      margin-bottom:18px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:14px;
      margin:14px 0;
      gap:18px;
    }

    .row span:first-child{color:var(--muted)}
    .row span:last-child{font-weight:700;text-align:right}

    .amount{
      margin:24px 0;
      padding:20px;
      border-radius:22px;
      background:linear-gradient(135deg,rgba(246,200,216,.42),rgba(220,239,255,.62));
      text-align:center;
    }

    .amount small{
      display:block;
      color:var(--muted);
      margin-bottom:6px;
      font-size:12px;
    }

    .amount strong{
      color:#e48baa;
      font-size:34px;
      font-weight:800;
    }

    .btn{
      width:100%;
      border:none;
      padding:17px;
      border-radius:18px;
      background:#202026;
      color:white;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 18px 38px rgba(0,0,0,.18);
      transition:.25s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
      background:#303038;
    }

    .note{
      text-align:center;
      margin:14px 0 18px;
      color:var(--muted);
      font-size:12px;
    }

    .logos{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:24px;
      background:#fff;
      border-radius:18px;
      padding:16px;
      border:1px solid #f1f1f1;
    }

    .visa{
      height:34px;
      width:auto;
      object-fit:contain;
    }

    .mastercard{
      height:38px;
      width:auto;
      object-fit:contain;
    }

    .powered{
      text-align:center;
      margin-top:14px;
      font-size:12px;
      color:var(--muted);
    }

    .powered b{color:var(--ink)}

    @media(max-width:820px){
      .card{
        grid-template-columns:1fr;
        max-width:500px;
      }

      h1{font-size:42px}
      .brand img{width:130px}
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">

      <div class="brand">
        <img src="Untitled_design.svg" alt="Veloria Logo">

        <h1>
          Secure <span>Payment</span>
        </h1>

        <p class="sub">
          Complete your order safely through FABMISR secure card payment page.
        </p>
      </div>

      <div class="pay-box">
        <div class="top">
          <div class="secure">● Secure Session</div>
          <div class="lock">🔒</div>
        </div>

        <h2>Order Summary</h2>

        <div class="row">
          <span>Order</span>
          <span>#VL-2054</span>
        </div>

        <div class="row">
          <span>Status</span>
          <span>Ready</span>
        </div>

        <div class="amount">
          <small>Total Amount</small>
          <strong>EGP 1,250</strong>
        </div>

        <button class="btn">Pay Now</button>

        <p class="note">
          You’ll be redirected to FABMISR official gateway.
        </p>

        <div class="logos">
          <img class="visa" src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
          <img class="mastercard" src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
        </div>

        <div class="powered">
          Secured by <b>FABMISR</b>
        </div>
      </div>

    </section>
  </main>
</body>
</html>
