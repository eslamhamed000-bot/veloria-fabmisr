<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Veloria Secure Payment</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;

      font-family:
      Inter,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      sans-serif;

      background:
      radial-gradient(circle at top left,
      rgba(255,210,230,.75),
      transparent 35%),

      radial-gradient(circle at bottom right,
      rgba(190,232,255,.9),
      transparent 40%),

      linear-gradient(
      135deg,
      #fff7fb,
      #eef8ff
      );

      color:#111;
    }

    .bg-blur{
      position:absolute;
      inset:0;
      backdrop-filter:blur(30px);
    }

    .card{
      position:relative;
      z-index:2;

      width:min(92%,520px);

      background:
      rgba(255,255,255,.72);

      border:
      1px solid rgba(255,255,255,.95);

      box-shadow:
      0 30px 80px rgba(70,60,90,.15);

      border-radius:36px;

      padding:46px 36px;

      text-align:center;
    }

    .logo-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;

      margin-bottom:34px;
    }

    .logo-wrap img{
      width:74px;
      height:74px;
      object-fit:contain;
      mix-blend-mode:multiply;
    }

    .brand{
      text-align:left;
    }

    .brand h1{
      margin:0;

      font-size:30px;
      line-height:1;

      font-family:Georgia,serif;
      font-weight:600;
    }

    .brand p{
      margin:6px 0 0;

      color:#777;
      font-size:12px;
      letter-spacing:.4px;
    }

    .secure-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;

      background:
      rgba(255,255,255,.8);

      padding:11px 16px;

      border-radius:999px;

      font-size:13px;
      font-weight:700;

      margin-bottom:28px;

      color:#444;
    }

    .title{
      font-size:46px;
      line-height:1.05;

      margin:0 0 18px;

      font-family:Georgia,serif;
      font-weight:600;
      letter-spacing:-1px;
    }

    .pink{
      color:#d98cab;
    }

    .blue{
      color:#9ccbe7;
    }

    .desc{
      font-size:16px;
      line-height:1.8;

      color:#555;

      margin-bottom:34px;
    }

    .loader-wrap{
      margin:24px auto 34px;
      width:82px;
      height:82px;
      position:relative;
    }

    .loader{
      width:82px;
      height:82px;

      border-radius:50%;

      border:
      4px solid rgba(217,140,173,.18);

      border-top:
      4px solid #d98cab;

      animation:spin 1s linear infinite;
    }

    .loader-inner{
      position:absolute;
      inset:16px;

      border-radius:50%;

      background:
      linear-gradient(
      135deg,
      rgba(255,220,235,.95),
      rgba(225,244,255,.95)
      );

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:22px;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

    .status{
      font-size:14px;
      color:#444;
      line-height:1.7;
      min-height:48px;
    }

    .cards{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:20px;

      margin-top:34px;
    }

    .visa{
      font-size:32px;
      font-weight:900;
      font-style:italic;
      letter-spacing:-1.5px;
      color:#1a1f71;
    }

    .mc{
      display:flex;
      align-items:center;
      gap:8px;

      font-size:13px;
      font-weight:800;
      color:#222;
    }

    .mc-mark{
      display:flex;
      align-items:center;
    }

    .red,
    .orange{
      width:30px;
      height:30px;
      border-radius:50%;
    }

    .red{
      background:#eb001b;
    }

    .orange{
      background:#f79e1b;
      margin-left:-10px;
      opacity:.92;
    }

    .ssl{
      margin-top:28px;
      font-size:12px;
      color:#777;
      line-height:1.7;
    }

    @media(max-width:640px){

      .card{
        padding:36px 24px;
        border-radius:28px;
      }

      .title{
        font-size:36px;
      }

      .logo-wrap img{
        width:62px;
        height:62px;
      }

      .brand h1{
        font-size:25px;
      }
    }

  </style>
</head>

<body>

  <div class="bg-blur"></div>

  <div class="card">

    <div class="logo-wrap">

      <img
      src="./Untitled_design.svg"
      alt="Veloria Logo">

      <div class="brand">
        <h1>Veloria</h1>
        <p>Make Up & Skin Care</p>
      </div>

    </div>

    <div class="secure-badge">
      🔒 SSL Secure Payment
    </div>

    <h2 class="title">
      Securing Your
      <span class="pink">Payment</span>
    </h2>

    <p class="desc">
      Please wait while we securely connect you
      to the bank payment gateway.
    </p>

    <div class="loader-wrap">

      <div class="loader"></div>

      <div class="loader-inner">
        💳
      </div>

    </div>

    <div class="status" id="status">
      Creating secure payment session...
    </div>

    <div class="cards">

      <div class="visa">
        VISA
      </div>

      <div class="mc">

        <span class="mc-mark">
          <span class="red"></span>
          <span class="orange"></span>
        </span>

        mastercard

      </div>

    </div>

    <div class="ssl">
      Secured by FABMISR · OTP Verification Enabled
    </div>

  </div>

<script>

async function startPayment(){

  const status =
  document.getElementById("status");

  try{

    status.innerHTML =
    "Creating encrypted payment session...";

    const response =
    await fetch("/api/create-payment",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      }
    });

    const data =
    await response.json();

    console.log(data);

    if(!data.success){

      status.innerHTML =
      "Payment session failed.<br>Please try again.";

      return;
    }

    status.innerHTML =
    "Secure session established.<br>Redirecting to bank...";

    /*
      IMPORTANT:
      Temporary redirect simulation.
      We'll replace this with
      the real hosted checkout redirect.
    */

    setTimeout(()=>{

      window.location.href =
      "https://www.fabmisr.com.eg/";

    },1800);

  }

  catch(error){

    console.error(error);

    status.innerHTML =
    "Something went wrong.<br>Please refresh the page.";

  }

}

startPayment();

</script>

</body>
</html>
